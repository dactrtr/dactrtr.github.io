<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv='X-UA-Compatible' content='IE=edge'>

        <meta property="og:type" content="article" />
        <meta property="og:title" content="{{ page.title }}" />
        <meta property="og:image" content="{{ page.feature }}" />
        <meta property="og:site_name" content="Dactrtr" />
        <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0'>

        <title>{% if page.title %}{{ page.title }} @ {% endif %}{{ site.name }} {{ site.description }}</title>

        <meta name="author" content="{{ site.name }}" />
        <meta name="description" content="{{ site.description }}">

        <!--[if lt IE 9]>
          <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
        <![endif]-->
        <link rel="apple-touch-icon-precomposed" sizes="57x57" href="{{ site.baseurl }}/assets/apple-touch-icon-57x57.png" />
        <link rel="apple-touch-icon-precomposed" sizes="114x114" href="{{ site.baseurl }}/assets/apple-touch-icon-114x114.png" />
        <link rel="apple-touch-icon-precomposed" sizes="72x72" href="{{ site.baseurl }}/assets/apple-touch-icon-72x72.png" />
        <link rel="apple-touch-icon-precomposed" sizes="144x144" href="{{ site.baseurl }}/assets/apple-touch-icon-144x144.png" />
        <link rel="apple-touch-icon-precomposed" sizes="60x60" href="{{ site.baseurl }}/assets/apple-touch-icon-60x60.png" />
        <link rel="apple-touch-icon-precomposed" sizes="120x120" href="{{ site.baseurl }}/assets/apple-touch-icon-120x120.png" />
        <link rel="apple-touch-icon-precomposed" sizes="76x76" href="{{ site.baseurl }}/assets/apple-touch-icon-76x76.png" />
        <link rel="apple-touch-icon-precomposed" sizes="152x152" href="{{ site.baseurl }}/assets/apple-touch-icon-152x152.png" />
        <link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/favicon-196x196.png" sizes="196x196" />
        <link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/favicon-32x32.png" sizes="32x32" />
        <link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/favicon-16x16.png" sizes="16x16" />
        <link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/favicon-128.png" sizes="128x128" />
        <meta name="application-name" content="&nbsp;"/>
        <meta name="msapplication-TileColor" content="#FFFFFF" />
        <meta name="msapplication-TileImage" content="mstile-144x144.png" />
        <meta name="msapplication-square70x70logo" content="mstile-70x70.png" />
        <meta name="msapplication-square150x150logo" content="mstile-150x150.png" />
        <meta name="msapplication-wide310x150logo" content="mstile-310x150.png" />
        <meta name="msapplication-square310x310logo" content="mstile-310x310.png" />
        <link
          rel="preconnect"
          href="https://fonts.googleapis.com"
        />
        <link
          rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin
        />
        <link
          href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&display=swap"
          rel="stylesheet"
        />
        <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/assets/slick/slick.css"/>
        <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/assets/slick/slick-theme.css"/>
        <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
        <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ site.baseurl }}/feed.xml" />
    </head>

    <body class="thepost">
        {% if page.feature %}
        <header class="single-header" style="
        background: url({{ page.feature }});
        background-size: cover;
        background-position-y: center;
        ">
        {% else %}
        <header class="single-header" style="
        background: url(http://i.giphy.com/FRmOsocKhM1xK.gif);
        background-size: cover;
        background-position-y: center;
        ">
        {% endif %}
                <span class="gradient"></span>
                <h1 class="title glitch_text">{{ page.title }}</h1>
                <h4 class="desc">{{ page.titledesc }}</h4>
                <a href="/blog/" class="home">
                    <span class="icons-up">
                        <p class="back"></p>
                    </span>
                </a>
        </header>

    <div id="single-post" role="main" class="container">
        <div class="wrapper">
          {{ content }}
        </div>
    </div>

    {% include portfolio-footer.html %}
    {% include analytics.html %}

    <script src="{{ site.baseurl }}/assets/js/gh-contribs.js" defer></script>
    <script type="text/javascript" src="//code.jquery.com/jquery-1.11.0.min.js"></script>
    <script type="text/javascript" src="//code.jquery.com/jquery-migrate-1.2.1.min.js"></script>
    <script type="text/javascript" src="{{ site.baseurl }}/assets/slick/slick.min.js"></script>
    <script type="text/javascript" src="{{ site.baseurl }}/assets/init.js"></script>

    </body>
</html>
